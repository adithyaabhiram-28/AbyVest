services:
  - type: web
    name: abyvest-ai
    runtime: python

    buildCommand: pip install -r requirements.txt

    startCommand: gunicorn app:app

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4

      - key: SECRET_KEY
        sync: false

      - key: GENAI_API_KEY
        sync: false

      - key: FINNHUB_API_KEY
        sync: false

      - key: CLOUDINARY_CLOUD_NAME
        sync: false

      - key: CLOUDINARY_API_KEY
        sync: false

      - key: CLOUDINARY_API_SECRET
        sync: false

      - key: DATABASE_URL
        fromDatabase:
          name: smart-stock-db
          property: connectionString

databases:
  - name: smart-stock-db
    databaseName: smartstocktracker
    plan: free